<body>

  <section id="loginScreen" class="login-screen">
    <main class="login-card">
      <div class="logo">
        <img
          src="https://drive.google.com/thumbnail?id=1P64M5G2qLW5yhazJUMvhTAIl3rEDD9Br&sz=w1000"
          alt="Portal Força Tática"
          onerror="this.outerHTML='<div style=&quot;color:#ffe600;font-size:64px&quot;>⚔️</div>'"
        >
      </div>

      <div class="field">
        <label for="loginRE">RE sem dígito</label>
        <input id="loginRE" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Ex.: 120566" oninput="this.value=this.value.replace(/\\D/g,'')">
      </div>

      <div class="field">
        <label for="loginSenha">Senha</label>
        <input id="loginSenha" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" placeholder="Digite sua senha" oninput="this.value=this.value.replace(/\\D/g,'')">
      </div>

      <button id="btnLogin" class="btn" onclick="fazerLogin()">ENTRAR</button>

      <div id="loginAlerta" class="alerta"></div>

      <div class="footer">
        Portal Força Tática • V1.5.3
      </div>
    </main>
  </section>


  <section id="appScreen" class="app hidden">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="top-title">
          <div class="top-mark top-mark-img">
            <img
              src="https://drive.google.com/thumbnail?id=1HsuKSfmhLwhnU6g1i4tqYd4gkOshqd89&sz=w600&v=137"
              alt="Símbolo FT"
              onerror="this.parentElement.innerHTML='⚔️'"
            >
          </div>
          <div class="top-text-group">
            <strong id="topSistema">SISTEMA CIA FT</strong>
            <span id="topUsuarioLogado">Usuário logado</span>
          </div>
        </div>

        <div class="top-actions">
          <button class="btn btn-secondary" onclick="abrirHome()">INÍCIO</button>
          <button class="btn btn-secondary" onclick="sair()">SAIR</button>
        </div>
      </div>
    </div>

    <div id="appConteudo"></div>
  </section>


  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx93RwTCtmiZ45_Tke0CqH6ArL4kTbQFW54_pnXRq69IYfE8_5JSjvECzBLoGaiMroGZQ/exec';

    const APP = {
      usuario: null,
      menus: [],
      permissoes: {}
    };

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('loginRE').addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') fazerLogin();
      });

      document.getElementById('loginSenha').addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') fazerLogin();
      });
    });


    function fazerLogin() {
      const login = document.getElementById('loginRE').value.trim();
      const senha = document.getElementById('loginSenha').value.trim();

      if (!login || !senha) {
        mostrarAlerta('Informe o RE e a senha.', 'erro');
        return;
      }

      setBotaoLogin(true);
      mostrarAlerta('Validando acesso...', 'info');

      chamarApi('login', { login, senha })
        .then(function(resp) {
          setBotaoLogin(false);

          if (!resp || !resp.ok) {
            mostrarAlerta(resp && resp.erro ? resp.erro : 'Falha no login.', 'erro');
            return;
          }

          APP.usuario = resp.dados.usuario;
          APP.menus = resp.dados.menus || [];
          APP.permissoes = resp.dados.permissoes || {};

          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('appScreen').classList.remove('hidden');
          window.scrollTo(0, 0);

          abrirHome();
        })
        .catch(function(err) {
          setBotaoLogin(false);
          mostrarAlerta('Erro ao conectar com a API.\n' + err.message, 'erro');
        });
    }


    function abrirHome() {
      window.scrollTo(0, 0);
      const u = APP.usuario;

      if (!u) return;

      const topoUsuarioLogado = document.getElementById('topUsuarioLogado');
      if (topoUsuarioLogado) {
        topoUsuarioLogado.textContent = [u.postoGrad, u.nomeGuerra].filter(Boolean).join(' ');
      }
      window.scrollTo(0, 0);

      document.getElementById('appConteudo').innerHTML = `
        <div class="home-hero">
          ${montarCardPolicial(u)}

          <div class="home-panel">
            <div class="home-panel-header">
              <div>
                <h2>Funcionalidades</h2>
                <p>Acesso rápido aos módulos do Sistema CIA FT, conforme seu perfil de permissão.</p>
              </div>
              <div class="home-version">V1.5.3</div>
            </div>

            <div class="home-situation-grid">
              ${homeSituation('🪪', 'Meus dados', 'Consulte seus dados e solicite correção cadastral quando necessário.')}
              ${homeSituation('📋', 'Rotina operacional', 'Acesse resenhas, escalas, folgas e registros vinculados ao serviço.')}
              ${homeSituation('📢', 'Comunicações', 'Acompanhe avisos da CIA FT e futuras ciências obrigatórias.')}
            </div>

            <div class="section-title home-menu-title">
              <div>
                <h2>Menu Principal</h2>
                <p>Selecione uma área para acessar.</p>
              </div>
            </div>

            <div class="menu-grid">
              ${montarMenusHome().map(montarMenuCard).join('') || '<div class="modal-card">Nenhum menu liberado para seu perfil.</div>'}
            </div>
          </div>
        </div>
      `;
    }

    function montarCardPolicial(u) {
      const foto = u.foto
        ? '<img src="' + escapar(u.foto) + '" onerror="this.parentElement.innerHTML=\'👤\'">'
        : '👤';

      const classeHierarquia = classeVisualHierarquia(u.postoGrad);

      return `
        <div class="pm-profile-card ${classeHierarquia}">
          <div class="pm-photo-area">
            <div class="foto-pm home">${foto}</div>
          </div>

          <div class="pm-main-info">
            <h1>${escapar(u.postoGrad || '')} ${escapar(u.nomeGuerra || '')}</h1>
            <div class="re-line">RE ${escapar(u.re || '')}</div>
            <span class="status">${escapar(u.status || '')}</span>
          </div>

          <div class="pm-detail-list">
            ${pmDetail('Pelotão', u.pelotao)}
            ${pmDetail('Modalidade', u.modalidade)}
            ${pmDetail('Função', u.funcao)}
            ${pmDetail('Perfil', u.perfilAcesso)}
          </div>
        </div>
      `;
    }

    function homeSituation(icone, titulo, texto) {
      return `
        <div class="home-situation-card">

      const hora = String(data.getHours()).padStart(2, '0');
      const min = String(data.getMinutes()).padStart(2, '0');
      const seg = String(data.getSeconds()).padStart(2, '0');

      return dia + '/' + mes + '/' + ano + ' ' + hora + ':' + min + ':' + seg;

    function chamarApi(action, params) {
      params = params || {};

      return new Promise(function(resolve, reject) {
        const callbackName = 'ft_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

        const query = new URLSearchParams();
        query.set('action', action);
        query.set('callback', callbackName);

        Object.keys(params).forEach(function(chave) {
          query.set(chave, params[chave]);
        });

        const script = document.createElement('script');

        const timeout = setTimeout(function() {
          cleanup();
          reject(new Error('Tempo esgotado ao chamar a API.'));
        }, 20000);

        window[callbackName] = function(resp) {
          clearTimeout(timeout);
          cleanup();
          resolve(resp);
        };

        script.onerror = function() {
          clearTimeout(timeout);
          cleanup();
          reject(new Error('Falha ao carregar resposta da API.'));
        };

        script.src = API_URL + '?' + query.toString();
        document.body.appendChild(script);

        function cleanup() {
          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    function normalizarTexto(valor) {
      return String(valor == null ? '' : valor)
        .trim()
        .toUpperCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ');
    }


    function escapar(valor) {
      return String(valor == null ? '' : valor)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }


    function escaparAttr(valor) {
      return escapar(valor).replace(/`/g, '&#096;');
    }
