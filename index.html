<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portal Força Tática • V1.7.4.1</title>
  <!--
  ============================================================
  SISTEMA CIA FT — INDEX DE RECUPERAÇÃO SEGURA
  Arquivo: index.html
  Base visual oficial: commit 1c83574a606bf07a28cc6e3b4abcec17d7d8d29e
  Motivo: restaura o front visual oficial V1.7.4.1 sem usar fetch.
  ============================================================
  -->
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #appFrame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #000;
      display: block;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(255,230,0,.10), transparent 34%), #000;
      z-index: 10;
      padding: 24px;
      text-align: center;
      transition: opacity .25s ease, visibility .25s ease;
    }
    #loading.oculto {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .box {
      width: min(440px, 92vw);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      padding: 22px;
      background: rgba(10,10,10,.94);
      box-shadow: 0 20px 50px rgba(0,0,0,.55);
    }
    .titulo {
      font-size: 20px;
      font-weight: 900;
      color: #ffe600;
      margin-bottom: 8px;
      letter-spacing: .3px;
    }
    .texto {
      color: #d1d5db;
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }
    .erro {
      display: none;
      margin-top: 14px;
      border: 1px solid rgba(255,92,92,.45);
      background: rgba(255,92,92,.14);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      font-size: 13px;
      line-height: 1.4;
    }
    .erro a {
      color: #ffe600;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="box">
      <div class="titulo">SISTEMA CIA FT</div>
      <p class="texto">Carregando o front visual oficial V1.7.4.1...</p>
      <div id="erro" class="erro">
        Não foi possível carregar automaticamente o front oficial pelo CDN.<br>
        <a id="linkAlternativo" href="#" target="_top" rel="noopener">Abrir versão oficial diretamente</a>
      </div>
    </div>
  </div>

  <iframe
    id="appFrame"
    title="Sistema CIA FT"
    referrerpolicy="no-referrer-when-downgrade"
    allow="clipboard-read; clipboard-write; fullscreen"
  ></iframe>

  <script>
    (function () {
      'use strict';

      var fontes = [
        'https://cdn.jsdelivr.net/gh/CiaFT/sistema-cia-ft@1c83574a606bf07a28cc6e3b4abcec17d7d8d29e/index.html',
        'https://cdn.statically.io/gh/CiaFT/sistema-cia-ft/1c83574a606bf07a28cc6e3b4abcec17d7d8d29e/index.html',
        'https://raw.githack.com/CiaFT/sistema-cia-ft/1c83574a606bf07a28cc6e3b4abcec17d7d8d29e/index.html'
      ];

      var atual = 0;
      var frame = document.getElementById('appFrame');
      var loading = document.getElementById('loading');
      var erro = document.getElementById('erro');
      var link = document.getElementById('linkAlternativo');
      var carregou = false;
      var timer = null;

      function ocultarLoading() {
        carregou = true;
        if (timer) clearTimeout(timer);
        setTimeout(function () {
          loading.classList.add('oculto');
        }, 650);
      }

      function mostrarErro() {
        if (timer) clearTimeout(timer);
        erro.style.display = 'block';
        link.href = fontes[0];
      }

      function carregarFonte(i) {
        atual = i;
        carregou = false;
        frame.src = fontes[atual];
        if (timer) clearTimeout(timer);
        timer = setTimeout(function () {
          if (carregou) return;
          if (atual + 1 < fontes.length) {
            carregarFonte(atual + 1);
          } else {
            mostrarErro();
          }
        }, 9000);
      }

      frame.addEventListener('load', function () {
        ocultarLoading();
      });

      frame.addEventListener('error', function () {
        if (atual + 1 < fontes.length) carregarFonte(atual + 1);
        else mostrarErro();
      });

      carregarFonte(0);
    })();
  </script>
</body>
</html>
