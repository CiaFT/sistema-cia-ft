<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sistema CIA FT</title>
  <style>
    :root {
      --bg: #08090c;
      --panel: #10131a;
      --panel-2: #151a23;
      --text: #f5f7fb;
      --muted: #aeb6c7;
      --line: rgba(255,255,255,.10);
      --yellow: #ffd000;
      --yellow-2: #f4b400;
      --danger: #e25252;
      --ok: #35b86b;
      --warn: #f4a62a;
      --oficial: #b8860b;
      --graduado: #960018;
      --pracinha: #0033a0;
      --radius: 18px;
      --shadow: 0 18px 50px rgba(0,0,0,.36);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,208,0,.07), transparent 34%),
        linear-gradient(180deg, #050608 0%, #0b0d12 45%, #08090c 100%);
      color: var(--text);
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      background: #000;
    }

    .login-card {
      width: min(430px, 100%);
      background: linear-gradient(180deg, #111 0%, #090909 100%);
      border: 1px solid rgba(255,208,0,.22);
      border-radius: 26px;
      padding: 28px 22px 20px;
      box-shadow: 0 24px 80px rgba(0,0,0,.65);
      text-align: center;
    }

    .brand-mark {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgba(255,208,0,.23), rgba(255,208,0,.04));
      border: 2px solid rgba(255,208,0,.45);
      color: var(--yellow);
      font-weight: 900;
      letter-spacing: 1px;
      font-size: 28px;
      overflow: hidden;
    }
    .brand-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }


    /* Visual oficial do login: logo grande, fundo preto e sem dependência de busca externa */
    .login-card { background: #000; }
    .brand-mark {
      width: 96%;
      max-width: 380px;
      height: 270px;
      margin: -8px auto 26px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }
    .brand-mark img { width: 100%; height: 100%; object-fit: contain; }
    @media (max-height: 740px) { .brand-mark { height: 235px; margin-bottom: 20px; } }

    .login-title {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: .8px;
    }

    .login-subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .field { text-align: left; margin-bottom: 14px; }
    .field label { display: block; margin-bottom: 7px; color: #dfe4ee; font-size: 13px; font-weight: 700; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background: rgba(255,255,255,.07);
      color: var(--text);
      padding: 13px 14px;
      outline: none;
    }
    .field textarea { min-height: 96px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: rgba(255,208,0,.58);
      box-shadow: 0 0 0 3px rgba(255,208,0,.10);
    }
    select option { background: #111827; color: #fff; }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 15px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: var(--yellow); color: #111; width: 100%; }
    .btn-primary:hover { background: #ffe15a; }
    .btn-secondary { background: rgba(255,255,255,.10); color: #fff; border: 1px solid rgba(255,255,255,.12); }
    .btn-soft { background: rgba(255,208,0,.12); color: var(--yellow); border: 1px solid rgba(255,208,0,.20); }
    .btn-danger { background: rgba(226,82,82,.13); color: #ffabab; border: 1px solid rgba(226,82,82,.24); }
    .btn-ok { background: rgba(53,184,107,.14); color: #9af0bf; border: 1px solid rgba(53,184,107,.25); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .login-footer { margin-top: 18px; color: #818898; font-size: 12px; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(8,9,12,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }
    .topbar-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .top-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .top-logo {
      width: 46px; height: 46px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,208,0,.13); color: var(--yellow); font-weight: 900;
      border: 1px solid rgba(255,208,0,.25);
      flex: 0 0 auto;
      overflow: hidden;
    }
    .top-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .top-title { min-width: 0; }
    .top-title strong { display: block; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-title span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .top-actions { display: flex; gap: 8px; align-items: center; }

    .container {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px 14px 80px;
      flex: 1;
    }

    .page-head {
      margin: 0 0 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      flex-wrap: wrap;
    }
    .page-head h1 { margin: 0 0 7px; font-size: clamp(24px, 4vw, 36px); letter-spacing: -.5px; }
    .page-head p { margin: 0; color: var(--muted); }

    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.03));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .card h2, .card h3 { margin: 0 0 12px; }
    .card-title { font-size: 18px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }

    .menu-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .menu-card {
      min-height: 112px;
      text-align: left;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.10);
      background: linear-gradient(135deg, rgba(255,208,0,.13), rgba(255,255,255,.04));
      color: #fff;
      width: 100%;
    }
    .menu-card strong { display: block; font-size: 18px; margin-bottom: 7px; }
    .menu-card span { color: var(--muted); font-size: 13px; }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      border: 3px solid rgba(255,255,255,.16);
      background: #1a202c;
      object-fit: cover;
      flex: 0 0 auto;
    }
    .avatar.oficial, .card-border.oficial { border-color: var(--oficial); }
    .avatar.graduado, .card-border.graduado { border-color: var(--graduado); }
    .avatar.pracinha, .card-border.pracinha { border-color: var(--pracinha); }
    .avatar.neutro, .card-border.neutro { border-color: rgba(255,255,255,.16); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #dfe4ee;
      border: 1px solid rgba(255,255,255,.10);
      font-size: 12px;
      font-weight: 800;
    }
    .pill.ok { background: rgba(53,184,107,.14); color: #a8f5c8; border-color: rgba(53,184,107,.25); }
    .pill.warn { background: rgba(244,166,42,.14); color: #ffd08a; border-color: rgba(244,166,42,.25); }
    .pill.danger { background: rgba(226,82,82,.14); color: #ffb4b4; border-color: rgba(226,82,82,.25); }

    .info-list { display: grid; gap: 10px; }
    .info-row {
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding-bottom: 9px;
      display: grid;
      grid-template-columns: minmax(130px, 220px) 1fr;
      gap: 10px;
    }
    .info-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .info-row span:first-child { color: var(--muted); }
    .info-row strong { font-weight: 800; }

    .module-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }
    .module-toolbar input, .module-toolbar select {
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.07);
      color: var(--text);
      border-radius: 13px;
      padding: 11px 12px;
      min-height: 42px;
      outline: none;
    }
    .module-toolbar input { flex: 1 1 260px; }
    .module-toolbar select { flex: 0 1 210px; }

    .lista-pms { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .pm-card {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: start;
      padding: 13px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.045);
      text-align: left;
      width: 100%;
      color: #fff;
    }
    .pm-card:hover { background: rgba(255,255,255,.07); }
    .pm-name { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
    .pm-meta { color: var(--muted); font-size: 13px; line-height: 1.45; }

    .section-card { margin-bottom: 14px; }
    .subsection-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .row-box {
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,.035);
      margin-bottom: 10px;
    }
    .row-box-title { font-weight: 900; margin-bottom: 10px; color: #fff; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 10px; border-bottom: 1px solid rgba(255,255,255,.08); text-align: left; vertical-align: top; }
    th { color: #dfe4ee; font-size: 12px; text-transform: uppercase; letter-spacing: .3px; }
    td { color: #f6f7fb; font-size: 13px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(520px, calc(100% - 26px));
      padding: 13px 15px;
      border-radius: 15px;
      background: #141a23;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      color: #fff;
      z-index: 100;
      display: none;
    }
    .toast.show { display: block; }
    .toast.ok { border-color: rgba(53,184,107,.45); }
    .toast.erro { border-color: rgba(226,82,82,.45); }
    .toast.aviso { border-color: rgba(244,166,42,.45); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(0,0,0,.68);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(760px, 100%);
      max-height: min(86vh, 900px);
      overflow-y: auto;
      background: #10131a;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      box-shadow: 0 28px 90px rgba(0,0,0,.62);
      padding: 16px;
    }
    .modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .modal-head h2 { margin: 0; }

    .empty {
      border: 1px dashed rgba(255,255,255,.18);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      color: var(--muted);
    }

    .footer-version { text-align: center; color: #778095; font-size: 12px; padding: 16px; border-top: 1px solid rgba(255,255,255,.07); }

    @media (max-width: 860px) {
      .menu-grid, .grid-2, .grid-3, .grid-4, .lista-pms { grid-template-columns: 1fr; }
      .top-actions .btn-secondary { padding: 10px 11px; }
      .info-row { grid-template-columns: 1fr; gap: 3px; }
      .profile-card { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  <div id="modal" class="modal-backdrop" onclick="fecharModalBackdrop(event)">
    <div class="modal" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
      <div id="modalContent"></div>
    </div>
  </div>

<script>
/*
 * SISTEMA CIA FT — index.html V1.8.2
 * Arquivo completo, carregando diretamente pelo GitHub Pages.
 * Mantém API_URL, chamarApi e fluxo de login.
 */
const APP_VERSION = 'V1.8.2';
const API_VERSION_COMPATIVEL = 'API FT V2.5.4';
const API_URL = 'https://script.google.com/macros/s/AKfycbx93RwTCtmiZ45_Tke0CqH6ArL4kTbQFW54_pnXRq69IYfE8_5JSjvECzBLoGaiMroGZQ/exec';
const LOGO_PORTAL_FT = 'https://drive.google.com/thumbnail?id=1P64M5G2qLW5yhazJUMvhTAIl3rEDD9Br&sz=w1000';
const LOGO_SIMBOLO_FT = 'https://drive.google.com/thumbnail?id=1HsuKSfmhLwhnU6g1i4tqYd4gkOshqd89&sz=w600';

const state = {
  usuario: null,
  permissoes: [],
  pagina: 'home',
  carregando: false,
  cache: {},
  consulta: { lista: [], filtros: { busca: '', pelotao: '', modalidade: '' } }
};

const $ = (id) => document.getElementById(id);

function texto(v) {
  return (v === null || v === undefined || v === '') ? '—' : String(v);
}

function escapeHtml(v) {
  return String(v === null || v === undefined ? '' : v)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function normalizar(v) {
  return String(v || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().trim();
}

function normalizarRE(v) {
  const digitos = String(v || '').replace(/\D/g, '');
  return digitos.substring(0, 6);
}

function classeHierarquia(posto) {
  const p = normalizar(posto);
  if (p.includes('SUBTEN') || p.includes('SGT')) return 'graduado';
  if (p.includes('MAJ') || p.includes('CAP') || p.includes(' TEN') || p === 'TEN' || p.includes('ASP')) return 'oficial';
  if (p.includes('CB') || p.includes('SD')) return 'pracinha';
  return 'neutro';
}

function labelModulo(modulo) {
  const m = normalizar(modulo).replaceAll(' ', '_');
  const labels = {
    'MEUS_DADOS': 'Meus Dados',
    'RESENHA_ESCALAS': 'Resenhas de Escalas',
    'RESENHA_DE_ESCALAS': 'Resenhas de Escalas',
    'ESCALAS_ADM': 'Escalas ADM',
    'CONSULTA_EFETIVO': 'Consulta do Efetivo',
    'PAINEL_ADMINISTRATIVO': 'Painel Administrativo',
    'GESTAO_PERMISSOES': 'Gestão de Permissões',
    'PERMISSOES_FT': 'Gestão de Permissões',
    'VIATURAS': 'Viaturas'
  };
  return labels[m] || modulo.replaceAll('_', ' ');
}

function descricaoModulo(modulo) {
  const m = normalizar(modulo).replaceAll(' ', '_');
  const desc = {
    'MEUS_DADOS': 'Consulte seu cadastro e solicite atualização de dados.',
    'RESENHA_ESCALAS': 'Envio da resenha operacional da Força Tática e ROCAM.',
    'RESENHA_DE_ESCALAS': 'Envio da resenha operacional da Força Tática e ROCAM.',
    'ESCALAS_ADM': 'Envio, consulta e análise das escalas administrativas semanais.',
    'CONSULTA_EFETIVO': 'Consulta autorizada do efetivo conforme escopo do perfil.'
  };
  return desc[m] || 'Acesso conforme perfil de permissão.';
}

function moduloKey(modulo) {
  return normalizar(modulo).replace(/[^A-Z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
}

function salvarSessao() {
  localStorage.setItem('appFTSessao', JSON.stringify({ usuario: state.usuario, permissoes: state.permissoes }));
}

function carregarSessao() {
  try {
    const raw = localStorage.getItem('appFTSessao');
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && s.usuario && s.usuario.token) {
      state.usuario = s.usuario;
      state.permissoes = Array.isArray(s.permissoes) ? s.permissoes : [];
    }
  } catch (err) {
    localStorage.removeItem('appFTSessao');
  }
}

function sair() {
  state.usuario = null;
  state.permissoes = [];
  state.pagina = 'home';
  state.cache = {};
  localStorage.removeItem('appFTSessao');
  render();
}

async function chamarApi(action, dados = {}) {
  const payload = Object.assign({}, dados, { action });
  if (state.usuario && state.usuario.token) {
    payload.token = state.usuario.token;
    payload.reLogado = state.usuario.re;
  }

  const resposta = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });

  const textoResposta = await resposta.text();
  let json;
  try {
    json = JSON.parse(textoResposta);
  } catch (err) {
    throw new Error('A API retornou uma resposta inválida. Verifique a implantação do Apps Script.');
  }
  if (!json.ok) throw new Error(json.mensagem || 'Não foi possível concluir a solicitação.');
  return json;
}

function toast(msg, tipo = 'aviso') {
  const el = $('toast');
  el.className = `toast show ${tipo}`;
  el.textContent = msg;
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => { el.className = 'toast'; }, 4200);
}

function setCarregando(flag) {
  state.carregando = flag;
  render();
}

function render() {
  const app = $('app');
  if (!state.usuario) {
    app.innerHTML = renderLogin();
    return;
  }
  app.innerHTML = `
    <div class="app-shell">
      ${renderTopbar()}
      <main class="container">
        ${state.carregando ? '<div class="loading card">Carregando...</div>' : renderPagina()}
      </main>
      <footer class="footer-version">Portal Força Tática • ${APP_VERSION} • ${API_VERSION_COMPATIVEL}</footer>
    </div>`;
  setTimeout(posRender, 0);
}

function posRender() {
  if ($('equipesFT') && $('equipesFT').children.length === 0) {
    adicionarEquipeFT();
    adicionarEquipeFT();
  }
  if ($('equipesRocam') && $('equipesRocam').children.length === 0) {
    adicionarEquipeRocam();
  }
}

function renderLogin() {
  return `
    <main class="login-page">
      <section class="login-card">
        <div class="brand-mark"><img src="${LOGO_PORTAL_FT}" alt="Portal Força Tática" onerror="this.parentNode.textContent='FT'" /></div>
        <h1 class="login-title">SISTEMA CIA FT</h1>
        <p class="login-subtitle">Acesso restrito ao efetivo autorizado</p>
        <form onsubmit="entrar(event)">
          <div class="field">
            <label for="loginRE">RE</label>
            <input id="loginRE" name="re" type="text" inputmode="numeric" autocomplete="username" placeholder="Digite os 6 primeiros dígitos" maxlength="12" required />
          </div>
          <div class="field">
            <label for="loginSenha">Senha</label>
            <input id="loginSenha" name="senha" type="password" inputmode="numeric" autocomplete="current-password" placeholder="Digite sua senha" required />
          </div>
          <button id="btnLogin" class="btn btn-primary" type="submit">ENTRAR</button>
        </form>
        <div class="login-footer">Portal Força Tática • ${APP_VERSION}</div>
      </section>
    </main>`;
}

async function entrar(event) {
  event.preventDefault();
  const btn = $('btnLogin');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  try {
    const re = normalizarRE($('loginRE').value);
    const senha = $('loginSenha').value.trim();
    const resp = await chamarApi('login', { re, senha });
    state.usuario = resp.usuario;
    state.permissoes = resp.permissoes || [];
    state.pagina = 'home';
    salvarSessao();
    render();
  } catch (err) {
    toast(err.message, 'erro');
    btn.disabled = false;
    btn.textContent = 'ENTRAR';
  }
}

function renderTopbar() {
  const u = state.usuario;
  return `
    <header class="topbar">
      <div class="topbar-inner">
        <div class="top-brand">
          <div class="top-logo"><img src="${LOGO_SIMBOLO_FT}" alt="FT" onerror="this.parentNode.textContent='FT'" /></div>

function renderPagina() {
  if (state.pagina === 'home') return renderHome();
  if (state.pagina === 'MEUS_DADOS') return renderMeusDados();
  if (state.pagina === 'RESENHA_ESCALAS' || state.pagina === 'RESENHA_DE_ESCALAS') return renderResenhas();
  if (state.pagina === 'ESCALAS_ADM') return renderEscalasAdm();
  if (state.pagina === 'CONSULTA_EFETIVO') return renderConsultaEfetivo();
  return renderHome();
}

function irHome() {
  state.pagina = 'home';
  render();
}

function renderHome() {
  const mods = state.permissoes.filter(p => String(p.visualizar || '').toUpperCase() === 'SIM' || String(p.acessoTotal || '').toUpperCase() === 'SIM');
  const unicos = [];
  const seen = new Set();
  mods.forEach(p => {
    const key = moduloKey(p.modulo);
    if (!seen.has(key)) { seen.add(key); unicos.push(p); }
  });

  return `
    <section class="page-head">
      <div>
        <h1>Menu Principal</h1>
        <p>Selecione uma área para acessar.</p>
      </div>
    </section>
    <section class="menu-grid">
      ${unicos.length ? unicos.map(p => `
        <button class="menu-card" onclick="abrirModulo('${moduloKey(p.modulo)}')">
          <strong>${escapeHtml(labelModulo(p.modulo))}</strong>
          <span>${escapeHtml(descricaoModulo(p.modulo))}</span>
        </button>`).join('') : '<div class="empty">Nenhum módulo liberado para este perfil no momento.</div>'}
    </section>`;
}

async function abrirModulo(modulo) {
  const key = moduloKey(modulo);
  state.pagina = key;
  render();
  try {
    if (key === 'MEUS_DADOS') await carregarMeusDados();
    if (key === 'RESENHA_ESCALAS' || key === 'RESENHA_DE_ESCALAS') await carregarResenhas();
    if (key === 'ESCALAS_ADM') await carregarEscalasAdm();
    if (key === 'CONSULTA_EFETIVO') await carregarConsultaEfetivo();
  } catch (err) {
    toast(err.message, 'erro');
  } finally {
    render();
  }
}

function coletarResenha() {
  const form = $('formResenha');

  const equipesFT = [...document.querySelectorAll('.equipe-ft')].map((box, i) => ({
    equipe: i + 1,
    vtr: box.querySelector(`[name^="ft_vtr_"]`).value,
    comandante: box.querySelector(`[name^="ft_comandante_"]`).value,
    motorista: box.querySelector(`[name^="ft_motorista_"]`).value,
    auxiliar1: box.querySelector(`[name^="ft_aux1_"]`).value,
    auxiliar2: box.querySelector(`[name^="ft_aux2_"]`).value,
    auxiliar3: box.querySelector(`[name^="ft_aux3_"]`).value
  }));
  const equipesRocam = [...document.querySelectorAll('.equipe-rocam')].map((box, i) => ({
    equipe: i + 1,
    motoEncarregado: box.querySelector(`[name^="rocam_moto_enc_"]`).value,
    encarregado: box.querySelector(`[name^="rocam_enc_"]`).value,
    motoAuxiliar: box.querySelector(`[name^="rocam_moto_aux_"]`).value,
    auxiliar: box.querySelector(`[name^="rocam_aux_"]`).value
  }));
  const folgas = [...document.querySelectorAll('.folga-item')].map(box => ({
    tipo: box.querySelector(`[name^="folga_tipo_"]`).value,
    re: box.querySelector(`[name^="folga_re_"]`).value,
    dataReferencia: box.querySelector(`[name^="folga_data_"]`).value,
    bopm: box.querySelector(`[name^="folga_bopm_"]`).value
  })).filter(x => x.tipo || x.re || x.dataReferencia || x.bopm);
  const afastamentos = [...document.querySelectorAll('.afastamento-item')].map(box => ({
    tipo: box.querySelector(`[name^="afast_tipo_"]`).value,
    re: box.querySelector(`[name^="afast_re_"]`).value,
    observacao: box.querySelector(`[name^="afast_obs_"]`).value
  })).filter(x => x.tipo || x.re || x.observacao);
  return { semanaReferencia: dados.semanaReferencia, dataLimite: dados.dataLimite, observacoes: dados.observacoes, equipesFT, equipesRocam, folgas, afastamentos };
}

  const safe = dia.key;
  return `

        <div class="field"><label>Tipo</label><select name="${safe}_tipo" onchange="atualizarDiaAdm(this)">${options(tipos)}</select></div>
        <div class="field extra-horario" style="display:none"><label>Horário</label><input name="${safe}_horario" value="das 07h00 às 18h00" /></div>

      </div>
    </div>`;

function atualizarDiaAdm(sel) {
  const box = sel.closest('.dia-adm');
  const tipo = normalizar(sel.value);
  box.querySelector('.extra-horario').style.display = tipo === 'EXPEDIENTE' ? 'block' : 'none';
  box.querySelector('.extra-desc').style.display = tipo === 'OUTROS' ? 'block' : 'none';
}

function coletarEscalaAdm(form) {
  const fd = new FormData(form);
  const semanaReferencia = fd.get('semanaReferencia');
  const dias = ['SEG','TER','QUA','QUI','SEX','SAB','DOM'];
  const escala = {};
  dias.forEach(dia => {
    const tipo = fd.get(`${dia}_tipo`) || '';
    const horario = fd.get(`${dia}_horario`) || '';
    const desc = fd.get(`${dia}_descricao`) || '';
    if (normalizar(tipo) === 'EXPEDIENTE') escala[dia] = horario || 'das 07h00 às 18h00';
    else if (normalizar(tipo) === 'OUTROS') escala[dia] = desc ? `OUTROS - ${desc}` : 'OUTROS';
    else escala[dia] = tipo;
  });
  return { semanaReferencia, escala, observacoes: fd.get('observacoes') || '' };
}

async function enviarEscalaAdm(event) {
  event.preventDefault();
  try {
    const payload = coletarEscalaAdm(event.currentTarget);
    const resp = await chamarApi('enviar_escala_adm', payload);
    toast(resp.mensagem || 'Escala ADM enviada.', 'ok');
    await carregarEscalasAdm();
    render();

    toast(err.message, 'erro');

            <td>${escapeHtml(e.semanaReferencia || '')}</td>
            <td>${escapeHtml(texto(e.SEG))}</td><td>${escapeHtml(texto(e.TER))}</td><td>${escapeHtml(texto(e.QUA))}</td><td>${escapeHtml(texto(e.QUI))}</td><td>${escapeHtml(texto(e.SEX))}</td><td>${escapeHtml(texto(e.SAB))}</td><td>${escapeHtml(texto(e.DOM))}</td>
            <td>${badgeDecisao(e.decisao)}</td>
            <td>${permissao.aprovar === 'SIM' ? `<button class="btn btn-soft" onclick="abrirAnaliseEscala('${escapeHtml(e.id)}')">Analisar</button>` : '<span class="muted small">—</span>'}</td>
          </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

function badgeDecisao(decisao) {
  const d = normalizar(decisao || 'PENDENTE');
  const cls = d === 'APROVADA' ? 'ok' : (d.includes('RECUS') || d.includes('CANCEL') ? 'danger' : 'warn');
  return `<span class="pill ${cls}">${escapeHtml(decisao || 'PENDENTE')}</span>`;
}

function abrirAnaliseEscala(id) {
  const lista = (state.cache.escalasAdm || {}).escalas || [];
  const e = lista.find(x => String(x.id) === String(id));
  if (!e) return toast('Escala não localizada.', 'erro');
  abrirModal(`
    <div class="modal-head"><h2>Analisar escala ADM</h2><button class="btn btn-secondary" onclick="fecharModal()">Fechar</button></div>
    <p><strong>${escapeHtml(e.postoGrad || '')} ${escapeHtml(e.nomeGuerra || '')}</strong><br><span class="muted">Semana: ${escapeHtml(e.semanaReferencia || '')}</span></p>
    <form onsubmit="decidirEscalaAdm(event, '${escapeHtml(e.id)}')">
      <div class="field"><label>Decisão</label><select name="decisao" required>${options(['APROVADA','RECUSADA','CORREÇÃO SOLICITADA','CANCELADA'])}</select></div>
      <div class="field"><label>Justificativa</label><textarea name="justificativa" placeholder="Obrigatória para recusa, correção ou cancelamento."></textarea></div>
      <button class="btn btn-primary" type="submit">SALVAR ANÁLISE</button>
    </form>`);
}

async function decidirEscalaAdm(event, id) {
  event.preventDefault();
  const dados = Object.fromEntries(new FormData(event.currentTarget).entries());
  try {
    const resp = await chamarApi('decidir_escala_adm', { id, decisao: dados.decisao, justificativa: dados.justificativa });
    toast(resp.mensagem || 'Análise registrada.', 'ok');
    fecharModal();
    await carregarEscalasAdm();
    render();
  } catch (err) {
    toast(err.message, 'erro');
  }
}

async function carregarConsultaEfetivo() {
  state.carregando = true; render();
  const resp = await chamarApi('dados_consulta_efetivo');
  state.consulta.lista = resp.efetivo || [];
  state.cache.consultaMeta = resp.meta || {};
  state.carregando = false;
}

function renderConsultaEfetivo() {
  const lista = state.consulta.lista || [];
  const meta = state.cache.consultaMeta || {};
  const pelotoes = meta.pelotoes || [...new Set(lista.map(x => x.pelotao).filter(Boolean))];
  const modalidades = meta.modalidades || [...new Set(lista.map(x => x.modalidade).filter(Boolean))];
  const filtrada = filtrarConsulta(lista);
  return `
    <section class="page-head">
      <div>
        <h1>Consulta do Efetivo</h1>
        <p>Busca autorizada conforme escopo do perfil.</p>
      </div>
      <button class="btn btn-secondary" onclick="carregarConsultaEfetivo().then(render)">Atualizar</button>
    </section>
    <div class="module-toolbar">
      <input id="buscaConsulta" placeholder="Buscar por RE, nome, pelotão, modalidade, função ou status" value="${escapeHtml(state.consulta.filtros.busca)}" oninput="state.consulta.filtros.busca=this.value; render()" />
      <select onchange="state.consulta.filtros.pelotao=this.value; render()"><option value="">Todos os pelotões</option>${pelotoes.map(p => `<option ${p === state.consulta.filtros.pelotao ? 'selected' : ''}>${escapeHtml(p)}</option>`).join('')}</select>
      <select onchange="state.consulta.filtros.modalidade=this.value; render()"><option value="">Todas modalidades</option>${modalidades.map(m => `<option ${m === state.consulta.filtros.modalidade ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('')}</select>
    </div>
    <div class="muted small" style="margin-bottom:10px">${filtrada.length} policial(is) localizado(s).</div>
    <section class="lista-pms">
      ${filtrada.length ? filtrada.map(renderCardPM).join('') : '<div class="empty">Nenhum policial encontrado com os filtros informados.</div>'}
    </section>`;
}

function filtrarConsulta(lista) {
  const f = state.consulta.filtros;
  const busca = normalizar(f.busca);
  return lista.filter(pm => {
    if (f.pelotao && pm.pelotao !== f.pelotao) return false;
    if (f.modalidade && pm.modalidade !== f.modalidade) return false;
    if (!busca) return true;
    const alvo = normalizar([pm.re, pm.nomeGuerra, pm.nomeCompleto, pm.pelotao, pm.modalidade, pm.funcao, pm.status, pm.postoGrad].join(' '));
    return alvo.includes(busca);
  });
}

function renderCardPM(pm) {
  const cls = classeHierarquia(pm.postoGrad);
  return `
    <button class="pm-card card-border ${cls}" onclick="abrirCardPolicial('${escapeHtml(pm.reNormalizado || pm.re)}')">
      <img class="avatar ${cls}" src="${escapeHtml(pm.foto || '')}" onerror="this.style.display='none'" alt="Foto" />
      <div>
        <div class="pm-name">${escapeHtml(pm.postoGrad || '')} ${escapeHtml(pm.nomeGuerra || '')}</div>
        <div class="pm-meta">
          Status: ${escapeHtml(texto(pm.status))}<br>
          RE: ${escapeHtml(texto(pm.re))}<br>
          Pelotão: ${escapeHtml(texto(pm.pelotao))} • Modalidade: ${escapeHtml(texto(pm.modalidade))}<br>
          Função: ${escapeHtml(texto(pm.funcao))}<br>
          Tel.: ${escapeHtml(texto(pm.telefone))} • E-mail: ${escapeHtml(texto(pm.email))}<br>
          Entrada Cia FT: ${escapeHtml(texto(pm.entradaCiaFt))}<br>
          Perfil APP: ${escapeHtml(texto(pm.perfil))}
        </div>
      </div>
    </button>`;
}

function abrirCardPolicial(re) {
  const alvo = normalizarRE(re);
  const pm = (state.consulta.lista || []).find(x => normalizarRE(x.reNormalizado || x.re) === alvo);
  if (!pm) return toast('Policial não localizado.', 'erro');
  const cls = classeHierarquia(pm.postoGrad);
  abrirModal(`
    <div class="modal-head"><h2>Detalhes do policial</h2><button class="btn btn-secondary" onclick="fecharModal()">Fechar</button></div>
    <div class="profile-card card-border ${cls}" style="border:2px solid; border-radius:18px; padding:12px; margin-bottom:14px">
      <img class="avatar ${cls}" src="${escapeHtml(pm.foto || '')}" onerror="this.style.display='none'" alt="Foto" />
      <div><h2 style="margin:0 0 4px">${escapeHtml(pm.postoGrad || '')} ${escapeHtml(pm.nomeGuerra || '')}</h2><div class="muted">${escapeHtml(pm.nomeCompleto || '')}</div></div>
    </div>
    <div class="info-list">
      ${infoRow('RE', pm.re)}
      ${infoRow('Status', pm.status)}
      ${infoRow('Pelotão', pm.pelotao)}
      ${infoRow('Modalidade', pm.modalidade)}
      ${infoRow('Função', pm.funcao)}
      ${infoRow('Telefone', pm.telefone)}
      ${infoRow('E-mail', pm.email)}
      ${infoRow('CPF', pm.cpf)}
      ${infoRow('RG', pm.rg)}
      ${infoRow('Endereço', pm.endereco)}
      ${infoRow('Nascimento', pm.nascimento)}
      ${infoRow('Entrada Cia FT', pm.entradaCiaFt)}
      ${infoRow('Saída', pm.saida)}
      ${infoRow('Perfil APP', pm.perfil)}
    </div>`);
}

function abrirModal(html) {
  $('modalContent').innerHTML = html;
  $('modal').classList.add('show');
}
function fecharModal() { $('modal').classList.remove('show'); $('modalContent').innerHTML = ''; }
function fecharModalBackdrop(event) { if (event.target.id === 'modal') fecharModal(); }

document.addEventListener('DOMContentLoaded', () => {
  carregarSessao();
  render();
  setTimeout(() => {
    if ($('equipesFT')) { adicionarEquipeFT(); adicionarEquipeFT(); }
    if ($('equipesRocam')) { adicionarEquipeRocam(); }
  }, 0);
});
</script>
</body>
</html>
