    function optionsViaturaModalidade(lista, valorAtual) {
      const valores = Array.isArray(lista) && lista.length ? lista : ['TÁTICO', 'ROCAM'];
      const atual = normalizarTexto(valorAtual || '');
      return '<option value="">Selecione</option>' + valores.map(function(v) {
        const texto = String(v || '');
        return `<option value="${escaparAttr(texto)}" ${normalizarTexto(texto) === atual ? 'selected' : ''}>${escapar(texto)}</option>`;
      }).join('');
    }

    function salvarNovaViatura() {
      if (!usuarioPodeInserirViatura()) {
        mostrarToastFt('Inclusão bloqueada', 'Seu perfil não possui permissão para adicionar viatura.');
        return;
      }

      const campos = {};
      document.querySelectorAll('#viaturaModalBackdrop [data-viatura-campo]').forEach(function(el) {
        const col = el.getAttribute('data-viatura-campo');
        const rotulo = el.getAttribute('data-viatura-rotulo');
        const valor = String(el.value || '').trim();
        campos[col] = valor;
        if (rotulo) campos[rotulo] = valor;
        const norm = normalizarTexto(rotulo || '').replace(/\s+/g, '_');
        if (norm === 'PREFIXO') campos.prefixo = valor;
        if (norm === 'MODALIDADE') campos.modalidade = valor;
        if (norm === 'STATUS_APP' || norm === 'STATUS APP') campos.statusApp = valor;
        if (norm === 'PLACA') campos.placa = valor;
        if (norm === 'MODELO_ANO' || norm === 'MODELO/ANO') campos.modeloAno = valor;
        if (norm === 'SITUACAO' || norm === 'SITUAÇÃO') campos.situacao = valor;
      });

      if (!campos.prefixo || !campos.modalidade) {
        mostrarToastFt('Viatura não enviada', 'Informe pelo menos PREFIXO e MODALIDADE.');
        return;
      }

      const btn = document.getElementById('btnSalvarNovaViatura');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'SALVANDO...';
      }

      chamarApi('adicionar_viatura', {
          login: APP.credenciais.login,
          senha: APP.credenciais.senha,
          campos: JSON.stringify(campos)
        })
        .then(function(resp) {
          if (!resp || !resp.ok) throw new Error(resp && resp.erro ? resp.erro : 'Falha ao adicionar viatura.');
          mostrarToastFt('Viatura adicionada', resp.dados && resp.dados.mensagem ? resp.dados.mensagem : 'Cadastro incluído com sucesso.');
          fecharFichaViatura();
          return carregarDadosViaturas(true).then(function() { renderizarViaturas(); });
        })
        .catch(function(err) {
          mostrarToastFt('Viatura não enviada', err.message || String(err));
        })
        .finally(function() {
          if (btn) {
            btn.disabled = false;
            btn.textContent = 'SALVAR NOVA VIATURA';
          }
        });
    }

    function agruparItensResenhaPorTipo(itens, tipoAlvo) {
      const grupos = {};
      (itens || []).forEach(function(item) {
        const tipo = normalizarTexto(item.tipo || '');
        if (tipo !== normalizarTexto(tipoAlvo)) return;
        const grupo = String(item.grupo || '1').trim() || '1';
        if (!grupos[grupo]) grupos[grupo] = [];
        grupos[grupo].push(item);
      });
      return Object.keys(grupos)
        .sort(function(a, b) { return Number(a) - Number(b); })
        .map(function(chave) { return { grupo: chave, itens: grupos[chave] }; });
    }


    function valorItemResenha(itens, nomes) {
      const alvos = (nomes || []).map(function(n) { return normalizarTexto(n); });
      const achado = (itens || []).find(function(item) {
        const campo = normalizarTexto(item.campo || '');
        return alvos.some(function(alvo) { return campo === alvo || campo.includes(alvo); });
      });
      return achado ? String(achado.valor || '').trim() : '';
    }

    function postoGradConhecidoResenha(texto) {
      const original = String(texto || '').trim().replace(/\s+/g, ' ');
      const norm = normalizarTexto(original).replace(/[º°ª.]/g, '').replace(/\s+/g, ' ');
      const postos = [
        { n: '1 TEN', r: '1º TEN' },
        { n: '2 TEN', r: '2º TEN' },
        { n: 'SUBTEN', r: 'SUBTEN' },
        { n: '1 SGT', r: '1º SGT' },
        { n: '2 SGT', r: '2º SGT' },
        { n: '3 SGT', r: '3º SGT' },
        { n: 'MAJ', r: 'MAJ' },
        { n: 'CAP', r: 'CAP' },
        { n: 'ASP', r: 'ASP' },
        { n: 'CB', r: 'CB' },
        { n: 'SD', r: 'SD' }
      ];

      for (let i = 0; i < postos.length; i++) {
        if (norm === postos[i].n || norm.startsWith(postos[i].n + ' ')) {
          return postos[i];
        }
      }

      return null;
    }


    function formatarIdentificacaoResenha(valor) {
      const texto = String(valor || '').trim().replace(/\s+/g, ' ');
      if (!texto) return '';

      let re = '';
      let base = texto;

      const reMatch = texto.match(/(?:^|\b)RE\s*[:\-]?\s*([0-9]{5,6}(?:\-[0-9Xx])?)/i);
      if (reMatch) {
        re = reMatch[1];
        base = texto.replace(reMatch[0], '').replace(/[—–-]+\s*$/g, '').replace(/^\s*[—–-]+/g, '').trim();
      } else {
        const numMatch = texto.match(/\b([0-9]{5,6}(?:\-[0-9Xx])?)\b/);
        if (numMatch) {
          re = numMatch[1];
          base = texto.replace(numMatch[0], '').trim();
        }
      }

      base = base.replace(/\s*[—–]\s*/g, ' ').replace(/\s+-\s+/g, ' ').replace(/\s+/g, ' ').trim();
      const posto = postoGradConhecidoResenha(base);

      if (posto) {
        const nome = base
          .replace(new RegExp('^' + posto.n.replace(/ /g, '\\s+'), 'i'), '')
          .replace(/^\s+/, '')
          .trim();
        return [posto.r, re, nome].filter(Boolean).join(' ');
      }

      return [re ? 'RE ' + re : '', base].filter(Boolean).join(' ').trim() || texto;
    }


    function prefixoViaturaResenha(valor) {
      const texto = String(valor || '').trim();
      if (!texto) return '';
      return texto
        .split('—')[0]
        .split('–')[0]
        .split(' / ')[0]
        .split(' - ')[0]
        .trim();
    }

    function renderizarBlocoObservacoesResenha(cabecalho, complementos) {
      const textos = [];
      if (cabecalho && cabecalho.observacoes) textos.push(cabecalho.observacoes);
      (complementos || []).forEach(function(c) {
        if (c && c.texto) textos.push(c.texto);
      });
      const texto = textos.filter(Boolean).join('\n');
      const html = texto
        ? '<div class="resenha-operacional-card"><div class="resenha-operacional-observacao">' + escapar(texto) + '</div></div>'
        : '';
      return blocoOperacionalResenha('OBSERVAÇÕES', html);
    }


    function renderizarCamposObjetoResenha(obj, ignorar) {
      ignorar = ignorar || [];
      const ignorarNorm = ignorar.map(normalizarTexto);
      return Object.keys(obj || {})
        .filter(function(k) {
          const v = obj[k];
          return v !== null && v !== undefined && String(v).trim() !== '' && ignorarNorm.indexOf(normalizarTexto(k)) === -1;
        })
        .map(function(k) {
          return `
            <div class="resenha-view-item">
              <small>${escapar(rotuloResenha(k))}</small>
              <strong>${escapar(obj[k])}</strong>
            </div>
          `;
        });
    }


    function renderizarLinhaObjetoResenha(obj, idx) {
      const titulo = obj.titulo || obj.tipo || obj.TIPO || obj.categoria || obj.CATEGORIA || '';
      const campos = renderizarCamposObjetoResenha(obj, ['id','id_resenha','resenha_id','titulo']);
      return `
        <div class="resenha-view-row">
          ${titulo ? '<div class="resenha-view-row-title">' + escapar(titulo) + '</div>' : ''}
          <div class="resenha-view-grid">${campos.join('') || '<div class="resenha-view-empty">Registro sem campos detalhados.</div>'}</div>
        </div>
      `;
    }


    function rotuloResenha(chave) {
      return String(chave || '')
        .replace(/_/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .trim();
    }


    function dataISOParaBR(iso) {
      const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return iso || '';
      return m[3] + '/' + m[2] + '/' + m[1];
    }


    function sair() {
      APP.usuario = null;
      APP.menus = [];
      APP.permissoes = {};
      APP.credenciais = null;
      APP.dadosResenha = null;
      APP.dadosEscalasAdm = null;
      APP.dadosConsultaEfetivo = null;
      APP.dadosViaturas = null;

      document.getElementById('appScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('loginSenha').value = '';
      document.getElementById('loginAlerta').style.display = 'none';
    }


    function chamarApi(action, params) {
      params = params || {};

      return new Promise(function(resolve, reject) {
        const callbackName = 'ft_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

        const query = new URLSearchParams();
        query.set('action', action);
        query.set('callback', callbackName);
        query.set('_cache', String(Date.now()));

        Object.keys(params).forEach(function(chave) {
          query.set(chave, params[chave]);
        });

        const script = document.createElement('script');

        const timeout = setTimeout(function() {
          cleanup();
          reject(new Error('Tempo esgotado ao chamar a API. Aguarde alguns segundos e tente novamente. A consulta foi otimizada nesta versão.'));
        }, 45000);

        window[callbackName] = function(resp) {
          clearTimeout(timeout);
          cleanup();
          resolve(resp);
        };

        script.onerror = function() {
          clearTimeout(timeout);
          cleanup();
          reject(new Error('Falha ao carregar resposta da API.'));
        };

        script.src = API_URL + '?' + query.toString();
        document.body.appendChild(script);

        function cleanup() {
          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }


    function mostrarAlerta(texto, tipo) {
      const el = document.getElementById('loginAlerta');
      el.textContent = texto || '';
      el.className = 'alerta ' + (tipo || 'info');
      el.style.display = 'block';
    }


    function setBotaoLogin(carregando) {
      const btn = document.getElementById('btnLogin');
      btn.disabled = carregando;
      btn.textContent = carregando ? 'ENTRANDO...' : 'ENTRAR';
    }


    function normalizarTexto(valor) {
      return String(valor == null ? '' : valor)
        .trim()
        .toUpperCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ');
    }


    function escapar(valor) {
      return String(valor == null ? '' : valor)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }


    function escaparAttr(valor) {
      return escapar(valor).replace(/`/g, '&#096;');
    }
  </script>
